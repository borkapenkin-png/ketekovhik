server {
    listen 80;
    server_name ketekohvik.ee www.ketekohvik.ee;
    return 301 https://ketekohvik.ee$request_uri;
}

server {
    listen 443 ssl;
    server_name www.ketekohvik.ee;
    ssl_certificate /etc/letsencrypt/live/ketekohvik.ee/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ketekohvik.ee/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://ketekohvik.ee$request_uri;
}

server {
    listen 443 ssl;
    server_name ketekohvik.ee;

    root /var/www/ketekovhik/frontend/build;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/ketekohvik.ee/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ketekohvik.ee/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /admin {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files $uri /index.html;
    }

    location / {
        try_files $uri /index.html;
    }
}
